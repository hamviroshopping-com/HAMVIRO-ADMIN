<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hamviro - Secure Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=500;600;700;800&family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Aapki Live Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCTyXa4Mih1upKkU_RKEp2M1nkUp1hi82g",
            authDomain: "hamviro-online.firebaseapp.com",
            projectId: "hamviro-online",
            storageBucket: "hamviro-online.firebasestorage.app",
            messagingSenderId: "477154267646",
            appId: "1:477154267646:web:4936546332a796aa64b0af"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const productsRef = collection(db, "products");

        const IMGBB_API_KEY = "a1734073279f85e1bef6a31a06627fdf"; 
        let STAGED_FILES_PERMANENT = [];

        window.showToast = function(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `custom-toast ${type}`;
            
            let icon = '<i class="fa-solid fa-circle-check"></i>';
            if (type === 'error') icon = '<i class="fa-solid fa-circle-xmark"></i>';
            if (type === 'warning') icon = '<i class="fa-solid fa-triangle-exclamation"></i>';

            toast.innerHTML = `
                ${icon}
                <div class="toast-message">${message}</div>
            `;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastFadeOut 0.4s ease forwards';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        function calculateDiscount() {
            const priceInput = document.getElementById("admPrice").value.replace(/,/g, '').trim(); 
            const oldPriceInput = document.getElementById("admOldPrice").value.replace(/,/g, '').trim(); 
            const discountField = document.getElementById("admDiscount"); 

            const sellingPrice = parseFloat(priceInput); 
            const oldPrice = parseFloat(oldPriceInput); 

            if (!isNaN(sellingPrice) && !isNaN(oldPrice) && oldPrice > sellingPrice && oldPrice > 0) { 
                const discountPercentage = Math.round(((oldPrice - sellingPrice) / oldPrice) * 100); 
                discountField.value = `-${discountPercentage}%`; 
            } else {
                discountField.value = ""; 
            }
        }

        document.getElementById("admPrice").addEventListener("input", calculateDiscount); 
        document.getElementById("admOldPrice").addEventListener("input", calculateDiscount); 

        document.getElementById("admImgFileBulk").addEventListener("change", async (e) => {
            const file = e.target.files[0]; 
            if (!file) return; 

            const statusBox = document.getElementById("zipStatusBox"); 
            statusBox.className = "status-box info show"; 
            statusBox.style.display = "flex"; 
            statusBox.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Processing ZIP..."; 

            try {
                const zip = await JSZip.loadAsync(file); 
                STAGED_FILES_PERMANENT = []; 
                const filePromises = []; 
                
                zip.forEach((relativePath, zipEntry) => { 
                    if (!zipEntry.dir && /\.(jfif|jpeg|jpg|png|webp|gif)$/i.test(zipEntry.name)) { 
                        const promise = zipEntry.async("blob").then(async (blob) => { 
                            return new Promise((resolve, reject) => { 
                                const reader = new FileReader(); 
                                reader.onloadend = async () => { 
                                    const base64Data = reader.result.split(',')[1]; 
                                    const formData = new FormData(); 
                                    formData.append("image", base64Data); 

                                    try {
                                        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { 
                                            method: "POST", 
                                            body: formData 
                                        });
                                        const result = await response.json(); 
                                        if (result.success) { 
                                            STAGED_FILES_PERMANENT.push(result.data.url); 
                                            resolve(); 
                                        } else {
                                            reject(result.error); 
                                        }
                                    } catch (err) {
                                        reject(err); 
                                    }
                                };
                                reader.onerror = reject; 
                                reader.readAsDataURL(blob); 
                            });
                        });
                        filePromises.push(promise); 
                    }
                });

                await Promise.all(filePromises); 
                statusBox.className = "status-box success show"; 
                statusBox.innerHTML = `<i class="fa-solid fa-circle-check"></i> Loaded ${STAGED_FILES_PERMANENT.length} Images`; 
            } catch (err) {
                console.error(err); 
                statusBox.className = "status-box error show"; 
                statusBox.innerHTML = "Upload failed."; 
            }
        });

        document.getElementById("adminForm").addEventListener("submit", async (e) => {
            e.preventDefault(); 
            const submitBtn = document.getElementById("submitBtn"); 
            submitBtn.disabled = true; 
            submitBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Uploading..."; 

            let imageUrls = document.getElementById("admImages").value.split(",").map(url => url.trim()).filter(url => url !== ""); 
            if (imageUrls.length === 0 && STAGED_FILES_PERMANENT.length > 0) { 
                imageUrls = STAGED_FILES_PERMANENT; 
            }

            if (imageUrls.length === 0) {
                showToast("Please upload a ZIP file or provide Image URLs!", "warning");
                submitBtn.disabled = false; 
                submitBtn.innerHTML = "➕ Add Product To Website"; 
                return; 
            }

            const productData = { 
                title: document.getElementById("admTitle").value.trim(), 
                category: document.getElementById("admCategory").value, 
                price: document.getElementById("admPrice").value.trim(), 
                oldPrice: document.getElementById("admOldPrice").value.trim(), 
                discount: document.getElementById("admDiscount").value.trim(), 
                images: imageUrls, 
                description: document.getElementById("admDesc").value.trim(), 
                overview: document.getElementById("admOverview").value.trim(), 
                timestamp: Date.now() 
            };

            try {
                await addDoc(productsRef, productData); 
                showToast("Product live ho chuka hai permanent images ke sath!", "success");
                document.getElementById("adminForm").reset(); 
                document.getElementById("zipStatusBox").style.display = "none"; 
                STAGED_FILES_PERMANENT = []; 
            } catch (error) {
                console.error(error); 
                showToast("Error: " + error.message, "error");
            } finally {
                submitBtn.disabled = false; 
                submitBtn.innerHTML = "➕ Add Product To Website";
            }
        });

        onSnapshot(productsRef, (snapshot) => {
            const viewContainer = document.getElementById("viewListContainer"); 
            const deleteContainer = document.getElementById("deleteListContainer"); 
            
            viewContainer.innerHTML = ""; 
            deleteContainer.innerHTML = ""; 
            
            if(snapshot.empty) { 
                const emptyMarkup = "<div class='empty-state'><i class='fa-regular fa-folder-open'></i><p>No products found.</p></div>"; 
                viewContainer.innerHTML = emptyMarkup; 
                deleteContainer.innerHTML = emptyMarkup; 
                return; 
            }

            snapshot.forEach((docSnap) => { 
                const product = docSnap.data(); 
                const id = docSnap.id; 
                const thumb = product.images && product.images[0] ? product.images[0] : 'https://placehold.co/40x40/1e293b/fff?text=No+Img'; 

                const viewRow = document.createElement("div"); 
                viewRow.className = "product-display-row animate-fade-in"; 
                viewRow.innerHTML = `
                    <div class="product-info-wrapper">
                        <img src="${thumb}" class="product-thumb-preview" onerror="this.src='https://placehold.co/40x40/1e293b/fff?text=No+Img'">
                        <div class="product-meta-text">
                            <span class="product-title-span">${product.title}</span>
                            <span class="product-category-span">${product.category.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="product-action-wrapper">
                        <span class="price-tag-badge">Rs. ${product.price}</span>
                    </div>
                `; 
                viewContainer.appendChild(viewRow); 

                const deleteRow = document.createElement("div"); 
                deleteRow.className = "product-display-row danger-row animate-fade-in"; 
                deleteRow.innerHTML = `
                    <div class="product-info-wrapper">
                        <img src="${thumb}" class="product-thumb-preview" onerror="this.src='https://placehold.co/40x40/1e293b/fff?text=No+Img'">
                        <div class="product-meta-text">
                            <span class="product-title-span">${product.title}</span>
                            <span class="product-category-span text-danger">${product.category.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="product-action-wrapper">
                        <button class="delete-btn" data-id="${id}"><i class="fa-solid fa-trash-can"></i> Delete</button>
                    </div>
                `; 
                deleteContainer.appendChild(deleteRow); 
            });

            document.querySelectorAll(".delete-btn").forEach(btn => { 
                btn.onclick = async (e) => { 
                    const docId = e.target.getAttribute("data-id") || e.target.closest('.delete-btn').getAttribute("data-id"); 
                    if(confirm("🚨 WARNING: Remove product?")) { 
                        await deleteDoc(doc(db, "products", docId)); 
                        showToast("Product Removed Successfully!", "success");
                    }
                };
            });
        });

        window.switchTab = function(tabName) { 
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); 
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active')); 
            
            if(tabName === 'view') { 
                document.getElementById('tabBtnView').classList.add('active'); 
                document.getElementById('tabContentView').classList.add('active'); 
            } else {
                document.getElementById('tabBtnDelete').classList.add('active'); 
                document.getElementById('tabContentDelete').classList.add('active'); 
            }
        }
    </script>
    
    <style>
        :root {
            --bg-main: #060a13;
            --card-bg: #0f172a;
            --input-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #ff5e14;
            --accent-hover: #e04f0f;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        html, body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            background-color: var(--bg-main); 
        }

        body { 
            color: var(--text-main);
            padding: 16px 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(255, 94, 20, 0.12), transparent 500px);
        }

        #toastContainer {
            position: fixed;
            top: 12px;
            right: 12px;
            left: 12px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 360px;
            margin: 0 auto;
        }

        .custom-toast {
            background: #1e293b;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .custom-toast.success { border-left: 4px solid var(--success); }
        .custom-toast.error { border-left: 4px solid var(--danger); }
        .toast-message { font-size: 13px; font-weight: 500; }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (min-width: 969px) {
            .dashboard-container {
                display: grid;
                grid-template-columns: 1.3fr 1fr;
                gap: 24px;
                margin-top: 20px;
            }
        }

        .admin-card { 
            background-color: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px; 
            padding: 16px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            width: 100%;
            overflow: hidden;
        }

        @media (min-width: 480px) {
            .admin-card { padding: 24px; }
        }

        .admin-header-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 12px; 
        }

        .admin-header-row h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 18px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge-live {
            background: rgba(16, 185, 129, 0.1); 
            color: var(--success); 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 10px; 
            font-weight: 700;
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .badge-live::before { content: ''; width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        .admin-input-group { margin-bottom: 14px; width: 100%; }
        .admin-input-group label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .admin-input-group input, .admin-input-group select, .admin-input-group textarea { 
            width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; outline: none; font-size: 14px; transition: all 0.2s ease;
        }
        .admin-input-group input:focus, .admin-input-group select:focus, .admin-input-group textarea:focus { border-color: var(--accent); }
        
        .form-split-row { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 0; 
        }

        @media (min-width: 480px) {
            .form-split-row {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
            }
        }

        .admin-action-btn { 
            width: 100%; padding: 14px; background: var(--accent); color: #ffffff; border: none; font-weight: 700; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; margin-top: 8px;
        }

        .status-box { padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-bottom: 14px; display: none; }
        .status-box.info { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .status-box.success { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .tabs-header-container {
            display: flex;
            background: #090f1d;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .tab-btn {
            flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 700; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .tab-btn.active { background: var(--input-bg); color: var(--text-main); }
        .tab-btn[data-type="danger"].active { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .inventory-scroll-box {
            max-height: 500px;
            overflow-y: auto;
            width: 100%;
        }

        /* --- STABLE ROW FIXES FOR MOBILE --- */
        .product-display-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 10px; 
            background: rgba(30, 41, 59, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.02); 
            border-radius: 8px; 
            margin-bottom: 8px; 
            width: 100%;
            box-sizing: border-box;
            gap: 12px;
        }

        .product-info-wrapper { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            min-width: 0; /* Ensures inner flex sizes properly without expanding row */
            flex: 1; 
        }

        .product-thumb-preview { 
            width: 38px; 
            height: 38px; 
            object-fit: cover; 
            border-radius: 6px; 
            background: var(--input-bg); 
            border: 1px solid var(--border); 
            flex-shrink: 0; 
        }

        .product-meta-text { 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
            min-width: 0; /* ALLOWS ELLIPSIS TO WORK CORRECTLY */
            flex: 1;
        }

        .product-title-span { 
            font-size: 13px; 
            font-weight: 600; 
            color: var(--text-main); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; /* FORCES EXCESSIVE TEXT TO TRUNCATE WITH ... */
            width: 100%;
        }

        .product-category-span { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; }

        .product-action-wrapper {
            flex-shrink: 0;
            display: flex;
            align-items: center;
        }

        .price-tag-badge { 
            background: rgba(255, 94, 20, 0.1); 
            color: var(--accent); 
            padding: 5px 8px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: 700; 
            white-space: nowrap;
        }
        
        .delete-btn { 
            background: rgba(239, 68, 68, 0.1); 
            color: var(--danger); 
            border: 1px solid rgba(239, 68, 68, 0.2); 
            padding: 5px 10px; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 11px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 4px;
            white-space: nowrap;
        }
        .delete-btn:hover { background: var(--danger); color: #fff; }

        .danger-alert-banner {
            background: rgba(239, 68, 68, 0.06); border: 1px dashed rgba(239, 68, 68, 0.2); padding: 10px; border-radius: 6px; font-size: 11px; color: #fca5a5; margin-bottom: 12px; display: flex; gap: 6px; align-items: center;
        }

        .animate-fade-in { animation: fadeInItem 0.35s ease forwards; }
        @keyframes fadeInItem { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .empty-state { text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; }
    </style>
</head>
<body>

    <div id="toastContainer"></div>

    <div class="dashboard-container">
        <!-- Input Form Section -->
        <div class="admin-card">
            <div class="admin-header-row">
                <h2>🚀 Hamviro Control Center</h2>
                <span class="badge-live">LIVE</span>
            </div>

            <form id="adminForm">
                <div class="admin-input-group">
                    <label>Product Title</label>
                    <input type="text" id="admTitle" placeholder="Premium Leather Wallet" required>
                </div>

                <div class="form-split-row">
                    <div class="admin-input-group">
                        <label>Product Category</label>
                        <select id="admCategory" required>
                            <option value="mega-offer">🔥 MEGA OFFER</option>
                            <option value="electronic">Electronic Devices</option>
                            <option value="accessories">Accessories</option>
                            <option value="beauty">Beauty & Cosmetics</option>
                            <option value="men-fashion">Men's Fashion</option>
                            <option value="ladies-fashion">Ladies' Fashion</option>
                        </select>
                    </div>
                    <div class="admin-input-group">
                        <label>Discount Tag</label>
                        <input type="text" id="admDiscount" placeholder="Auto-Calculated..." readonly style="background: rgba(30, 41, 59, 0.5); color: var(--success); font-weight: 700;">
                    </div>
                </div>

                <div class="form-split-row">
                    <div class="admin-input-group">
                        <label>Selling Price (Rs.)</label>
                        <input type="text" id="admPrice" placeholder="1,499" required>
                    </div>
                    <div class="admin-input-group">
                        <label>Old Price (Rs.)</label>
                        <input type="text" id="admOldPrice" placeholder="2,200">
                    </div>
                </div>

                <div class="admin-input-group">
                    <label style="color: var(--accent);"><i class="fa-solid fa-file-zipper"></i> Upload Images ZIP</label>
                    <input type="file" id="admImgFileBulk" accept=".zip">
                </div>
                
                <div id="zipStatusBox" class="status-box"></div>

                <div class="admin-input-group">
                    <label>Or Image URLs</label>
                    <input type="text" id="admImages" placeholder="https://link.com/img.jpg">
                </div>

                <div class="admin-input-group">
                    <label>Short Description</label>
                    <textarea id="admDesc" rows="3" required></textarea>
                </div>

                <div class="admin-input-group">
                    <label>Product Overview</label>
                    <textarea id="admOverview" rows="4" placeholder="Material: PU Leather" required></textarea>
                </div>

                <button type="submit" class="admin-action-btn" id="submitBtn">➕ Add Product To Website</button>
            </form>
        </div>

        <!-- Inventory List Section -->
        <div class="admin-card">
            <div class="tabs-header-container">
                <button type="button" class="tab-btn active" id="tabBtnView" onclick="switchTab('view')">
                    <i class="fa-solid fa-eye"></i> Inventory
                </button>
                <button type="button" class="tab-btn" id="tabBtnDelete" data-type="danger" onclick="switchTab('delete')">
                    <i class="fa-solid fa-trash"></i> Danger Zone
                </button>
            </div>

            <div id="tabContentView" class="tab-content active">
                <div class="inventory-scroll-box" id="viewListContainer"></div>
            </div>

            <div id="tabContentDelete" class="tab-content">
                <div class="danger-alert-banner">
                    <i class="fa-solid fa-circle-exclamation" style="color: var(--danger);"></i>
                    <span>Products deleted here cannot be recovered.</span>
                </div>
                <div class="inventory-scroll-box" id="deleteListContainer"></div>
            </div>
        </div>
    </div>

</body>
</html>
